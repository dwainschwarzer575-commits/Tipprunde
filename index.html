        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let games = [];
        let allTips = {};

        // Daten live abrufen
        onValue(ref(db, 'games'), (snapshot) => {
            games = snapshot.val() || [];
            render();
        });

        onValue(ref(db, 'users'), (snapshot) => {
            allTips = snapshot.val() || {};
            render();
        });

        window.addGame = () => {
            const phase = document.getElementById('newPhase').value;
            const home = document.getElementById('newHome').value;
            const away = document.getElementById('newAway').value;
            const newId = Date.now();
            update(ref(db, 'games/' + games.length), { id: newId, phase, home, away, resH: null, resA: null });
        };

        window.saveMyTips = () => {
            const name = document.getElementById('userName').value.trim();
            if (!name) return alert("Namen eingeben!");
            const tips = Array.from(document.querySelectorAll('.tipH')).map(el => ({
                id: el.dataset.id, h: el.value, a: document.querySelector(`.tipA[data-id="${el.dataset.id}"]`).value
            }));
            update(ref(db, 'users/' + name), { tips: tips });
        };

        window.updateResult = (index, type, val) => {
            update(ref(db, 'games/' + index), { [type === 'h' ? 'resH' : 'resA']: val });
        };

        window.deletePlayer = (name) => {
            remove(ref(db, 'users/' + name));
        };
